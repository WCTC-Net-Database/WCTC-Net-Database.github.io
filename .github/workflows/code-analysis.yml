name: Generate Code Analysis

on:
  workflow_dispatch:
    inputs:
      assignment_filter:
        description: 'Assignment pattern (leave empty for all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Analysis
        run: |
          chmod +x .github/scripts/analyze-repos.sh
          bash .github/scripts/analyze-repos.sh "${{ inputs.assignment_filter }}"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/analysis.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update code analysis $(date -u '+%Y-%m-%d')"
          git push

      - name: Trigger Pages Deploy
        run: |
          gh workflow run static.yml --ref main 2>/dev/null || true
